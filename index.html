<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 백업 도구</title>
  <link rel="icon" href="fav.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- 헤더 -->
<header class="app-header">
  <a class="app-logo" href="#">
    <img class="app-logo-mark" src="fav.png" alt="로고">
    채팅 백업
  </a>
  <div class="header-actions">
    <button class="icon-btn" id="theme-btn" title="다크모드 전환">
      <i class="fas fa-moon"></i>
    </button>
    <button class="icon-btn" id="help-btn" title="도움말" onclick="document.getElementById('help-panel').classList.add('open');document.getElementById('help-overlay').classList.add('show')">
      <i class="fas fa-question"></i>
    </button>
  </div>
</header>

<!-- 메인 2단 레이아웃 -->
<div class="app-body">

  <!-- 왼쪽: 입력 + 프로필 -->
  <aside class="left-panel">

    <!-- 플랫폼 선택 -->
    <div class="platform-section">
      <div class="platform-label">플랫폼</div>
      <div class="platform-pills">
        <button class="platform-pill active" data-platform="auto">
          <span class="platform-dot dot-auto"></span>자동 감지
        </button>
        <button class="platform-pill" data-platform="band">
          <span class="platform-dot dot-band"></span>밴드
        </button>
        <button class="platform-pill" data-platform="kakao">
          <span class="platform-dot dot-kakao"></span>카카오톡
        </button>
        <button class="platform-pill" data-platform="discord">
          <span class="platform-dot dot-discord"></span>디스코드
        </button>
        <button class="platform-pill" data-platform="roll20">
          <span class="platform-dot dot-roll20"></span>롤20
        </button>
      </div>
    </div>

    <!-- 텍스트 입력 -->
    <div class="input-section">
      <label for="input-text">채팅 붙여넣기</label>
      <textarea
        id="input-text"
        placeholder="채팅 내보내기 텍스트를 여기에 붙여넣으세요.
txt 파일을 끌어다 놓아도 됩니다.

밴드, 카카오톡, 디스코드 형식을 자동으로 인식합니다."
      ></textarea>
      <div class="detect-badge" id="detect-badge"></div>
      <button class="btn btn-primary" id="analyze-btn" style="align-self:flex-start">
        <i class="fas fa-search"></i> 분석
      </button>
    </div>

    <!-- 프로필 설정 -->
    <div class="profiles-section">
      <div class="profiles-header">
        <span class="section-title">참여자</span>
        <div class="profiles-actions">
          <button class="text-btn" id="uncheck-all-btn" onclick="
            window.chatApp.state.selectedUsers.clear();
            window.chatApp.uiManager._saveProfiles();
            window.chatApp.uiManager.renderProfileCards();
            window.chatApp.uiManager.renderMessages();
          ">체크 해제</button>
          <button class="text-btn" id="select-mode-btn" onclick="
            window.chatApp.uiManager.toggleProfileSelectionMode(true);
          ">선택 초기화</button>
          <button class="text-btn" id="reset-selected-btn" style="display:none" onclick="
            window.chatApp.uiManager.resetSelectedProfiles();
          ">초기화</button>
          <button class="text-btn" id="cancel-select-btn" style="display:none" onclick="
            window.chatApp.uiManager.toggleProfileSelectionMode(false);
          ">취소</button>
        </div>
      </div>
      <div class="profile-grid" id="profile-grid"></div>
    </div>

  </aside>

  <!-- 오른쪽: 미리보기 -->
  <main class="right-panel">

    <!-- 툴바 -->
    <div class="preview-toolbar">
      <div class="preview-toolbar-left">
        <span class="msg-count" id="msg-count"></span>
      </div>

      <!-- 꾸미기 토글 -->
      <button class="btn" id="decor-btn">
        <i class="fas fa-chevron-up"></i> 꾸미기
      </button>

      <!-- HTML 복사 -->
      <button class="btn btn-primary" id="copy-btn">
        <i class="fas fa-copy"></i> HTML 복사
      </button>

      <!-- 다운로드 드롭다운 -->
      <div class="dropdown-wrap">
        <button class="btn" id="download-btn">
          <i class="fas fa-download"></i> 저장
          <i class="fas fa-caret-down" style="font-size:11px;margin-left:2px"></i>
        </button>
        <div class="dropdown-menu" id="download-menu">
          <div class="dropdown-item" id="download-html-btn">
            <i class="fas fa-file-code"></i> HTML로 저장
          </div>
          <div class="dropdown-item" id="download-txt-btn">
            <i class="fas fa-file-alt"></i> TXT로 저장
          </div>
        </div>
      </div>

      <!-- 초기화 -->
      <button class="icon-btn" id="clear-btn" title="초기화">
        <i class="fas fa-trash"></i>
      </button>
    </div>

    <!-- 꾸미기 패널 (접힘) -->
    <div class="decor-panel" id="decor-panel">
      <div class="decor-panel-inner">

        <div class="decor-row">
          <span class="decor-label">글자 크기</span>
          <div class="font-size-control">
            <input type="range" id="font-size-slider" min="12" max="20" step="1" value="14">
            <span class="font-size-value" id="font-size-value">14px</span>
          </div>
        </div>

        <div class="decor-row">
          <span class="decor-label">태그 강조</span>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="highlight-tags-toggle" checked>
            @멘션 파란색으로
          </label>
        </div>

        <div class="decor-row">
          <span class="decor-label">내 프로필</span>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="show-my-profile-toggle" checked>
            내 메시지에 사진 표시
          </label>
        </div>

        <div class="decor-row">
          <span class="decor-label">프로필 사진 모양</span>
          <div class="avatar-shape-control">
            <button class="avatar-shape-btn active" data-shape="circle" title="원형">
              <span class="shape-preview shape-circle"></span>
            </button>
            <button class="avatar-shape-btn" data-shape="rounded" title="둥근 네모">
              <span class="shape-preview shape-rounded"></span>
            </button>
            <button class="avatar-shape-btn" data-shape="square" title="네모">
              <span class="shape-preview shape-square"></span>
            </button>
          </div>
        </div>

        <!-- 롤20 CSS 편집 토글 (롤20 플랫폼일 때만 표시) -->
        <div class="decor-row" id="r20-css-row" style="display:none">
          <span class="decor-label">CSS 편집</span>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="r20-css-enabled">
            메시지 편집 시 CSS까지 편집
          </label>
        </div>

      </div>
    </div>

    <!-- 채팅 미리보기 -->
    <div id="chat-container">
      <div class="empty-state">
        <div class="empty-state-icon"><i class="fas fa-comments"></i></div>
        <div class="empty-state-text">채팅을 붙여넣고 분석을 누르세요</div>
      </div>
    </div>

  </main>
</div>

<!-- 로딩 오버레이 -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">처리 중...</div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 도움말 패널 -->
<div class="help-overlay" id="help-overlay" onclick="document.getElementById('help-panel').classList.remove('open');this.classList.remove('show')"></div>
<aside class="help-panel" id="help-panel">
  <div class="help-header">
    <span class="help-title">도움말</span>
    <button class="icon-btn" onclick="document.getElementById('help-panel').classList.remove('open');document.getElementById('help-overlay').classList.remove('show')">
      <i class="fas fa-times"></i>
    </button>
  </div>
  <div class="help-body">
    <div id="help-list-view">
      <div class="help-section-list">
        <button class="help-section-btn" onclick="window._showHelpDetail('analyze')"><i class="fas fa-search"></i> 채팅 입력 및 분석</button>
        <button class="help-section-btn" onclick="window._showHelpDetail('profile')"><i class="fas fa-user"></i> 프로필 설정</button>
        <button class="help-section-btn" onclick="window._showHelpDetail('preview')"><i class="fas fa-edit"></i> 채팅 미리보기 및 편집</button>
        <button class="help-section-btn" onclick="window._showHelpDetail('download')"><i class="fas fa-download"></i> 파일로 저장하기</button>
        <button class="help-section-btn" onclick="window._showHelpDetail('settings')"><i class="fas fa-sliders-h"></i> 설정 옵션</button>
        <button class="help-section-btn" onclick="window._showHelpDetail('update')"><i class="fas fa-history"></i> 업데이트 내역</button>
      </div>
      <div style="height:1px;background:var(--border);margin:16px 0"></div>
      <button class="cache-clear-btn" onclick="window._clearAllCache()"><i class="fas fa-trash-alt"></i> 모든 캐시 및 설정 초기화</button>
      <div style="padding:16px 0 4px;font-size:11px;color:var(--text-3);text-align:center">v2.0.0 · @C2H5OH_snow</div>
    </div>
    <div id="help-detail-view" style="display:none;flex-direction:column;height:100%">
      <button class="help-detail-back" onclick="window._showHelpList()"><i class="fas fa-arrow-left"></i> 뒤로</button>
      <div class="help-detail-title" id="help-detail-title"></div>
      <div class="help-detail-body" id="help-detail-body"></div>
    </div>
  </div>

</aside>

<!-- 스크립트 (파서 먼저) -->
<script src="js/parsers/BandParser.js"></script>
<script src="js/parsers/Roll20Parser.js"></script>
<script src="js/parsers/KakaoParser.js"></script>
<script src="js/parsers/DiscordParser.js"></script>
<script src="js/Data.js"></script>
<script src="js/Media.js"></script>
<script src="js/UI.js"></script>
<script src="js/Export.js"></script>
<script src="js/Core.js"></script>

<script>

        <li>밴드 채팅 내보내기 두 가지 형식 자동 인식</li>

      <h4>v1.1.0 <span style="font-weight:400;color:var(--text-3)">(25.03.13)</span></h4>

        <li>도움말 시스템, @태그 강조, 드래그&드롭 파일 불러오기</li>
        <li>다크모드에서 내보내기 시 라이트 색상 유지</li>

  }
};
window._showHelpDetail = function(id) {
  const d = HELP_CONTENT[id];
  if (!d) return;
  document.getElementById('help-detail-title').textContent = d.title;
  document.getElementById('help-detail-body').innerHTML = d.body;
  document.getElementById('help-list-view').style.display = 'none';
  document.getElementById('help-detail-view').style.display = 'flex';
};
window._showHelpList = function() {
  document.getElementById('help-detail-view').style.display = 'none';
  document.getElementById('help-list-view').style.display = '';
};
window._clearAllCache = function() {
  if (!confirm('모든 캐시와 설정을 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  const go = () => { localStorage.clear(); location.reload(); };
  window.chatApp?.dataManager?.resetAllData().then(go) || go();
};
document.getElementById('help-btn').addEventListener('click', function() { window._showHelpList(); });
</script>
